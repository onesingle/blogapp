{% extends "layout.html" %}
{% block body %}
  <form action="{{ url_for('show_or_update', todo_id=todo.id) }}" method=post class="form-horizontal">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <h2>Edit Todo</h2>
    <div class="control-group">
        <div class="controls">
          <input type="text" id="title" name="title" class="input-xlarge"
            placeholder="Please give title to todo item" value="{{ todo.title }}"
            required>
        </div>
    </div>

    <div class="control-group">
        <div class="controls">
          <textarea name="text" rows=10 class="input-xlarge" placeholder="describe the todo item" required>{{ todo.text }}</textarea>
        </div>
    </div>

    <div class="control-group">
        <div class="controls">
          <label class="checkbox">
            <input type="checkbox" name="done.{{ todo.id }}" {% if todo.done%}checked{%endif%}> Mark as done
          </label>
        </div>
    </div>

    <div class="control-group">
        <div class="controls">
          <button type="submit" class="btn btn-success">Update Todo</button>
          <a href="{{ url_for('index') }}">Back to list</a>
        </div>
    </div>
  </form>

  <form action="{{ url_for('delete_todo', todo_id=todo.id) }}" method="post" style="margin-top: 20px;">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure?')">Delete</button>
  </form>
{% endblock %}
